services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ainodeats
      POSTGRES_USER: ainodeats
      POSTGRES_PASSWORD: ainodeats
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainodeats"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ainodeats_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ainodeats_data:
